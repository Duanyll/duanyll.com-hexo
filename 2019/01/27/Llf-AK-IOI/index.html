ass="punctuation">,</span></span><br><span class="line">			<span class="string">"const int INF = 0x3f3f3f3f;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"const int MAXN = $1;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">""</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"int main(){"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t//ifstream cin(\"$2.in\");"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t//ofstream cout(\"$2.out\");"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t$0"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\treturn 0;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"}"</span></span><br><span class="line">		<span class="punctuation">]</span></span><br><span class="line">	<span class="punctuation">}</span><span class="punctuation">,</span></span><br><span class="line">	<span class="attr">"Fast Read"</span><span class="punctuation">:</span><span class="punctuation">{</span></span><br><span class="line">		<span class="attr">"scope"</span><span class="punctuation">:</span> <span class="string">"cpp"</span><span class="punctuation">,</span></span><br><span class="line">		<span class="attr">"prefix"</span><span class="punctuation">:</span> <span class="string">"fastread"</span><span class="punctuation">,</span></span><br><span class="line">		<span class="attr">"body"</span><span class="punctuation">:</span> <span class="punctuation">[</span></span><br><span class="line">			<span class="string">"#include &lt;cctype&gt;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"#include &lt;cstdio&gt;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">""</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"inline int read()"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"{"</span><span class="punctuation">,</span></span><br><span class="line">    		<span class="string">"\tint X = 0, w = 0;"</span><span class="punctuation">,</span></span><br><span class="line">    		<span class="string">"\tchar ch = 0;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\twhile (!isdigit(ch))"</span><span class="punctuation">,</span></span><br><span class="line">    		<span class="string">"\t{"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t\tw |= ch == '-';"</span><span class="punctuation">,</span></span><br><span class="line">        	<span class="string">"\t\tch = getchar();"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t}"</span><span class="punctuation">,</span></span><br><span class="line">    		<span class="string">"\twhile (isdigit(ch)){"</span><span class="punctuation">,</span></span><br><span class="line">        	<span class="string">"\t\tX = (X &lt;&lt; 3) + (X &lt;&lt; 1) + (ch ^ 48);"</span><span class="punctuation">,</span></span><br><span class="line">        	<span class="string">"\t\tch = getchar();"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t}"</span><span class="punctuation">,</span></span><br><span class="line">    		<span class="string">"\treturn w ? -X : X;"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"}"</span></span><br><span class="line">		<span class="punctuation">]</span></span><br><span class="line">	<span class="punctuation">}</span><span class="punctuation">,</span></span><br><span class="line">	<span cl       }
    });

      e.trigger.setAttribute('aria-label', "复制成功！");

    })
  })
