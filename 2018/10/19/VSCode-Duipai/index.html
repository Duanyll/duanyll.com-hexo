    </h1>

  <div class="content" itemprop="articleBody">
    <p>不多说,上代码</p>
<span id="more"></span>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line">g++ Problem.cpp -o Problem.out</span><br><span class="line">g++ Problem_std.cpp -o Problem_std.out</span><br><span class="line">g++ Problem_dm.cpp -o Problem_dm.out</span><br><span class="line"><span class="built_in">printf</span> <span class="string">"Compile Compelete\n"</span></span><br><span class="line"><span class="keyword">while</span> <span class="literal">true</span>; <span class="keyword">do</span></span><br><span class="line">    ./Problem_dm.out &gt; Problem.<span class="keyword">in</span></span><br><span class="line">    <span class="built_in">printf</span> <span class="string">"Data made\n"</span></span><br><span class="line">    ./Problem_std.out &lt; Problem.<span class="keyword">in</span> &gt; Problem_std.ans</span><br><span class="line">    <span class="built_in">printf</span> <span class="string">"Std compelete\n"</span></span><br><span class="line">    ./Problem.out &lt; Problem.<span class="keyword">in</span> &gt; Problem.ans</span><br><span class="line">    <span class="built_in">printf</span> <span class="string">"Ans Compelete\n"</span></span><br><span class="line">    <span class="keyword">if</span> diff Problem.ans Problem_std.ans; <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">printf</span> <span class="string">"AC\n"</span></span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="built_in">printf</span> <span class="string">"WA\n"</span></span><br><span class="line">        <span class="built_in">exit</span> 0</span><br><span class="line">    <span class="keyword">fi</span></span><br><span class="line"><span class="keyword">done</span></span><br></pre></td></tr></table></figure>
<p>为了充分利用VSCode,将下列代码加入代码片段,一秒打出对拍</p>
<figure class="highlight json"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line"><span class="punctuation">{</span></span><br><span class="line">	<span class="attr">"Duipai"</span><span class="punctuation">:</span><span class="punctuation">{</span></span><br><span class="line">		<span class="attr">"prefix"</span><span class="punctuation">:</span> <span class="string">"duipai"</span><span class="punctuation">,</span></span><br><span class="line">		<span class="attr">"body"</span><span class="punctuation">:</span> <span class="punctuation">[</span></span><br><span class="line">			<span class="string">"g++ $1.cpp -o $1.out"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"g++ $1_std.cpp -o $1_std.out"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"g++ $1_dm.cpp -o $1_dm.out"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"while true; do"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t./$1_dm.out &gt; $1.in"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t./$1_std.out &lt; $1.in &gt; $1_std.ans"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t./$1.out &lt; $1.in &gt; $1.ans"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\tif diff $1.ans $1_std.ans; then"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t\tprintf \"AC\\n\""</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\telse"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t\tprintf \"WA\\n\""</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\t\texit 0"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"\tfi"</span><span class="punctuation">,</span></span><br><span class="line">			<span class="string">"done"</span></span><br><span class="line">		<span class="punctuation">]</span></span><br><span class="line">	<span class="punctuation">}</span></span><br><span class="line"><span class="punctuation">}</span></span><br></pre></td></tr></table></figure>
